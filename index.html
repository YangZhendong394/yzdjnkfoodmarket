<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喂！放下那块炸鸡 - 健康饮食，从计算代价开始</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
        }
        /* 语言切换按钮 */
        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            font-size: 14px;
        }
        .lang-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 4px 12px;
            cursor: pointer;
            color: #666;
            font-size: 13px;
            transition: all 0.2s;
            font-weight: 500;
        }
        .lang-btn:hover {
            background: #f0f0f0;
        }
        .lang-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            color: #666;
            font-size: 18px;
            margin-bottom: 40px;
        }
        .features {
            display: grid;
            gap: 20px;
            margin-bottom: 40px;
        }
        .feature {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 25px;
            text-align: left;
        }
        .feature-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            margin-bottom: 15px;
        }
        .feature h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .feature p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .download-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 35px;
            color: white;
        }
        .download-section h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .download-section p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        .download-btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 14px 32px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        .footer {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- 语言切换 -->
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="zh" onclick="switchLang('zh')">中文</button>
            <button class="lang-btn" data-lang="en" onclick="switchLang('en')">English</button>
        </div>

        <!-- Logo -->
        <div class="logo">🍗</div>

        <!-- 标题 -->
        <h1 id="app-title">喂！放下那块炸鸡</h1>
        <p class="tagline" id="tagline">健康饮食，从计算代价开始</p>

        <!-- 功能模块 -->
        <div class="features" id="features">
            <!-- 由 JavaScript 动态生成 -->
        </div>

        <!-- 下载区域 -->
        <div class="download-section">
            <h3 id="download-title">今天就开始你的健康之旅</h3>
            <p id="download-desc">现在就下载，迈出健康生活的第一步</p>
            <!-- ⚠️ 请将下方 YOUR_APP_STORE_LINK 替换为你的真实 App Store 链接 -->
            <a href="YOUR_APP_STORE_LINK" class="download-btn" id="download-btn">前往 App Store 下载</a>
        </div>

        <div class="footer" id="footer-text">© 2026 喂！放下那块炸鸡。保留所有权利。</div>
    </div>

    <script>
        // 翻译数据
        const translations = {
            zh: {
                title: "喂！放下那块炸鸡",
                tagline: "健康饮食，从计算代价开始",
                features: [
                    { icon: '📊', title: "追踪你的进展", desc: "记录日常饮食，通过直观的数据可视化看到自己的改善与进步。" },
                    { icon: '🏃', title: "运动抵消", desc: "记录运动，自动从垃圾食品摄入中扣除消耗的卡路里。跑步、骑行、游泳 —— 动起来！" },
                    { icon: '🔒', title: "隐私优先", desc: "所有数据只保存在你的设备上。无需账户、无云端上传、无追踪。你的饮食数据只属于你自己。" }
                ],
                downloadTitle: "今天就开始你的健康之旅",
                downloadDesc: "现在就下载，迈出健康生活的第一步",
                downloadBtn: "前往 App Store 下载",
                footer: "© 2026 喂！放下那块炸鸡。保留所有权利。"
            },
            en: {
                title: "Drop That Fried Chicken",
                tagline: "Healthy Eating Made Fun & Rewarding",
                features: [
                    { icon: '📊', title: "Track Your Progress", desc: "Monitor your daily eating habits and see your improvement over time with beautiful visualizations." },
                    { icon: '🏃', title: "Exercise Offset", desc: "Log your workouts and automatically deduct calories from your junk food intake. Run, cycle, swim – get moving!" },
                    { icon: '🔒', title: "Privacy First", desc: "All data stays on your device. No accounts, no cloud upload, no tracking. Your diet is your own business." }
                ],
                downloadTitle: "Start Your Healthy Journey Today",
                downloadDesc: "Download now and take the first step towards a healthier lifestyle",
                downloadBtn: "Download on the App Store",
                footer: "© 2026 Drop That Fried Chicken. All rights reserved."
            }
        };

        let currentLang = 'zh';

        function renderFeatures(lang) {
            const container = document.getElementById('features');
            const items = translations[lang].features;
            container.innerHTML = '';
            items.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'feature';
                div.innerHTML = `
                    <div class="feature-icon">${item.icon}</div>
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                `;
                container.appendChild(div);
            });
        }

        function switchLang(lang) {
            if (lang === currentLang) return;
            currentLang = lang;

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            const t = translations[lang];
            document.getElementById('app-title').textContent = t.title;
            document.getElementById('tagline').textContent = t.tagline;
            document.getElementById('download-title').textContent = t.downloadTitle;
            document.getElementById('download-desc').textContent = t.downloadDesc;
            document.getElementById('download-btn').textContent = t.downloadBtn;
            document.getElementById('footer-text').textContent = t.footer;

            renderFeatures(lang);
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            document.title = t.title + ' - ' + (lang === 'zh' ? '健康饮食，从计算代价开始' : 'Healthy Eating Made Fun & Rewarding');
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderFeatures('zh');
            document.querySelector('.lang-btn[data-lang="zh"]').classList.add('active');
            document.querySelector('.lang-btn[data-lang="en"]').classList.remove('active');
        });
    </script>
</body>
</html>
